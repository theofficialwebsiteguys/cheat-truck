<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="nav-inner">

    <!-- Logo -->
    <a routerLink="/" class="nav-logo" (click)="closeMenu()">
      @if (!logoError()) {
        <img src="assets/images/logo.png" alt="The #CheatTruck New York" (error)="onLogoError()">
      }
      <span class="logo-fallback" [style.display]="logoError() ? 'flex' : 'none'">
        <span class="logo-the">THE</span>
        <span class="logo-cheat">#CHEAT</span>
        <span class="logo-truck">TRUCK NY</span>
      </span>
    </a>

    <!-- Desktop Links -->
    <ul class="nav-links">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Home</a></li>
      <li><a routerLink="/our-story" routerLinkActive="active" (click)="closeMenu()">Our Story</a></li>
      <li><a routerLink="/menu" routerLinkActive="active" (click)="closeMenu()">Menu</a></li>
      <li><a routerLink="/catering" routerLinkActive="active" (click)="closeMenu()">Catering</a></li>
      <li><a routerLink="/events" routerLinkActive="active" (click)="closeMenu()">Events</a></li>
      <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
    </ul>

    <!-- CTA -->
    <a routerLink="/contact" class="nav-cta" (click)="closeMenu()">Book the Truck</a>

    <!-- Hamburger -->
    <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="menuOpen()">
    <ul>
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Home</a></li>
      <li><a routerLink="/our-story" routerLinkActive="active" (click)="closeMenu()">Our Story</a></li>
      <li><a routerLink="/menu" routerLinkActive="active" (click)="closeMenu()">Menu</a></li>
      <li><a routerLink="/catering" routerLinkActive="active" (click)="closeMenu()">Catering</a></li>
      <li><a routerLink="/events" routerLinkActive="active" (click)="closeMenu()">Events</a></li>
      <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
      <li><a routerLink="/contact" class="mobile-cta" (click)="closeMenu()">Book the Truck</a></li>
    </ul>
  </div>
</nav>
